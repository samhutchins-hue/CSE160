<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Change a point color</title>
  </head>

  <link rel="icon" href="data:," />
  <p>Sam Hutchins</p>
  <p>sthutchi@ucsc.edu</p>
  <p>Notes to Grader:</p>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <!-- <p id="numdot">XXX</p> -->
    <div id="controls">
      <p>
        <button id="clearButton">Clear</button>
      </p>
      <p>
        <button id="pointButton">point</button>
        <button id="triangleButton">triangle</button>
        <button id="circleButton">circle</button>
        <button id="myPictureButton">draw picture</button>
      </p>
      <p>
        red
        <input
          type="range"
          id="redSlider"
          name="red"
          value="100"
          min="0"
          max="100"
          step="any"
        />
      </p>

      <p>
        green
        <input
          type="range"
          id="greenSlider"
          name="green"
          value="100"
          min="0"
          max="100"
          step="any"
        />
      </p>
      <p>
        blue
        <input
          type="range"
          id="blueSlider"
          name="blue"
          value="100"
          min="0"
          max="100"
          step="any"
        />
      </p>
      <p>
        size
        <input
          type="range"
          id="sizeSlider"
          name="size"
          value="10"
          min="0"
          max="100"
          step="any"
        />
      </p>

      <p>
        camera angle
        <input
          type="range"
          id="angleSlider"
          name="segment"
          value="5"
          min="0"
          max="90"
          step="1"
        />
      </p>
    </div>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="Point.js"></script>
    <script src="asgn2.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="Cube.js"></script>
  </body>
</html>
