<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Change a point color</title>
  </head>

  <link rel="icon" href="data:," />
  <p>Sam Hutchins</p>
  <p>sthutchi@ucsc.edu</p>
  <p>Notes to Grader: shift+click to poke the penguin</p>
  <p>gunter</p>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <p id="numdot">XXX</p>
    <div id="controls">
      <p>
        <button id="animOn">on</button>
        <button id="animOff">off</button>
      </p>

      <p>
        camera angle
        <input
          type="range"
          id="angleSlider"
          name="segment"
          value="5"
          min="0"
          max="360"
          step="1"
        />
      </p>

      <p>
        left shoulder
        <input
          type="range"
          id="leftShoulderSlider"
          name="segment"
          value="0"
          min="-90"
          max="0"
          step="1"
        />
      </p>

      <p>
        left elbow
        <input
          type="range"
          id="leftElbowSlider"
          name="elbow"
          value="0"
          min="-90"
          max="0"
          step="1"
        />
      </p>

      <p>
        left wrist
        <input
          type="range"
          id="leftWristSlider"
          name="wrist"
          value="0"
          min="-90"
          max="90"
          step="1"
        />
      </p>

      <p>
        right shoulder
        <input
          type="range"
          id="rightShoulderSlider"
          name="segment"
          value="0"
          min="0"
          max="90"
          step="1"
        />
      </p>

      <p>
        right elbow
        <input
          type="range"
          id="rightElbowSlider"
          name="elbow"
          value="0"
          min="-90"
          max="90"
          step="1"
        />
      </p>

      <p>
        right wrist
        <input
          type="range"
          id="rightWristSlider"
          name="wrist"
          value="0"
          min="-90"
          max="90"
          step="1"
        />
      </p>
    </div>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asgn2.js"></script>
    <script src="Triangle.js"></script>
    <script src="Cube.js"></script>
    <script src="Cone.js"></script>
    <script src="Bird.js"></script>
  </body>
</html>
